name: REST Assured API Test CI/CD

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write
  checks: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ============================================================
  # JOB 1 — Run API Tests
  # ============================================================
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Run tests
      - name: Run Tests with Maven
        id: run-tests
        run: mvn test -B --no-transfer-progress -Dmaven.test.failure.ignore=true

      # 5. Parse test results from Surefire XML reports
      - name: Parse test results
        if: always()
        id: parse-results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; ERRORS=0
          for f in target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep  -oP 'tests="\K[0-9]+'    "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            sk=$(grep -oP 'skipped="\K[0-9]+'  "$f" | head -1)
            er=$(grep -oP 'errors="\K[0-9]+'   "$f" | head -1)
            TOTAL=$((TOTAL   + ${t:-0}))
            FAILED=$((FAILED  + ${fa:-0}))
            SKIPPED=$((SKIPPED + ${sk:-0}))
            ERRORS=$((ERRORS  + ${er:-0}))
          done
          PASSED=$((TOTAL - FAILED - SKIPPED - ERRORS))
          [ "$TOTAL" -gt 0 ] && PASS_PCT=$((PASSED * 100 / TOTAL)) || PASS_PCT=0
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "pass_pct=$PASS_PCT" >> $GITHUB_OUTPUT

      # 6. Upload raw Allure results so the next job can generate the report
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 30

      # 7. Upload Surefire XML reports as a separate downloadable artifact
      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 14

      # 8. Send HTML email report via Gmail SMTP
      - name: Send email report
        if: always()
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_EMAIL }}
        run: |
          cat > /tmp/send_email.py << 'SCRIPTEOF'
          import os, smtplib, json, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          gmail_user = os.environ.get("GMAIL_ADDRESS", "")
          gmail_pass = os.environ.get("GMAIL_APP_PASS", "")
          report_to  = os.environ.get("REPORT_TO", "")
          if not all([gmail_user, gmail_pass, report_to]):
              print("Email secrets not configured - skipping")
              exit(0)

          total    = os.environ.get("TOTAL", "0")
          passed   = os.environ.get("PASSED", "0")
          failed   = os.environ.get("FAILED", "0")
          skipped  = os.environ.get("SKIPPED", "0")
          errors   = os.environ.get("ERRORS", "0")
          pass_pct = os.environ.get("PASS_PCT", "0")
          run_num  = os.environ.get("RUN_NUM", "0")
          branch   = os.environ.get("BRANCH", "unknown")
          actor    = os.environ.get("ACTOR", "unknown")
          run_url  = os.environ.get("RUN_URL", "")
          commit_url = os.environ.get("COMMIT_URL", "")
          short_sha  = os.environ.get("SHORT_SHA", "")
          event    = os.environ.get("EVENT", "push")
          pages_url  = os.environ.get("PAGES_URL", "")
          triggers = {"push": "Push to branch", "pull_request": "Pull Request", "workflow_dispatch": "Manual trigger", "schedule": "Scheduled run"}
          trigger  = triggers.get(event, event)

          failing_tests = []
          for json_file in sorted(glob.glob("target/allure-results/*-result.json")):
              try:
                  with open(json_file, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception:
                  continue
              if data.get("status") not in ["failed", "broken"]:
                  continue
              labels = {l["name"]: l["value"] for l in data.get("labels", [])}
              test_class = labels.get("testClass", "").split(".")[-1] or "Unknown"
              steps_list = [str(i) + ". " + s.get("name", "Step") for i, s in enumerate(data.get("steps", []), 1)]
              steps_str  = "<br>".join(steps_list) if steps_list else "See Allure report for trace."
              desc       = (data.get("description") or "No description.").replace("\n", "<br>")
              severity   = labels.get("severity", "normal").capitalize()
              msg        = data.get("statusDetails", {}).get("message", "No assertion message.")
              failing_tests.append({"name": data.get("name", "Unknown Test"), "class": test_class,
                  "desc": desc, "steps": steps_str, "severity": severity, "message": msg})

          is_pass  = int(failed) == 0 and int(errors) == 0
          status   = "PASSED" if is_pass else "FAILED"
          s_color  = "#2e7d32" if is_pass else "#b71c1c"
          s_bg     = "#e8f5e9" if is_pass else "#ffebee"
          timestamp = datetime.now(timezone.utc).strftime("%d %B %Y at %H:%M UTC")
          next_steps = ("All tests passed. No action required." if is_pass else
              "<strong>Action required.</strong> One or more tests failed. Review the failure report below.")

          fail_block = ""
          if failing_tests:
              fail_block = "<h2 style='margin:32px 0 12px;font-size:18px;color:#b71c1c'>Detailed Failure Report</h2>"
              for t in failing_tests:
                  fail_block += (
                      "<div style='border:1px solid #ffcdd2;border-radius:8px;margin-bottom:20px;background:#fff'>"
                      "<div style='background:#ffebee;padding:12px 16px;border-bottom:1px solid #ffcdd2'>"
                      "<p style='margin:0;font-weight:700;color:#b71c1c'>" + t["name"] + "</p>"
                      "<p style='margin:2px 0 0;font-size:11px;color:#666'>" + t["class"] + " | Severity: " + t["severity"] + "</p>"
                      "</div><div style='padding:16px;font-size:13px;color:#333'>"
                      "<p><strong>Description:</strong><br>" + t["desc"] + "</p>"
                      "<p><strong>Steps:</strong><br>" + t["steps"] + "</p>"
                      "<div style='background:#f8f9fa;padding:12px;font-family:monospace;font-size:12px;border-left:4px solid #b71c1c;color:#c62828'>" + t["message"] + "</div>"
                      "</div></div>"
                  )

          # Include the live report link in the email if available
          report_btn = ""
          if pages_url:
              report_btn = ("<a href='" + pages_url + "' style='display:inline-block;background:#00897b;color:#fff;"
                  "text-decoration:none;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:700;margin:5px'>"
                  "View Live Allure Report</a>")

          html = (
              "<!DOCTYPE html><html><head><meta charset='UTF-8'></head>"
              "<body style='margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif'>"
              "<table width='100%' style='background:#f4f6f9;padding:32px 0'><tr><td align='center'>"
              "<table width='620' style='max-width:620px'>"
              "<tr><td style='background:#1a237e;border-radius:10px 10px 0 0;padding:28px 36px'>"
              "<p style='margin:0;font-size:11px;color:#9fa8da;text-transform:uppercase'>Automated Test Report</p>"
              "<h1 style='margin:6px 0 0;font-size:24px;color:#fff'>REST Assured API CI Pipeline</h1>"
              "<p style='margin:6px 0 0;font-size:12px;color:#9fa8da'>Run #" + run_num + "</p></td></tr>"
              "<tr><td style='background:" + s_bg + ";padding:20px 36px;border-left:5px solid " + s_color + "'>"
              "<p style='margin:0;font-size:20px;font-weight:700;color:" + s_color + "'>Build " + status + "</p>"
              "<p style='margin:6px 0 0;font-size:12px;color:#555'>" + timestamp + "</p></td></tr>"
              "<tr><td style='background:#fff;padding:28px 36px'>"
              "<h2 style='color:#1a237e'>Run Details</h2>"
              "<table width='100%' style='border:1px solid #e8eaf0;border-radius:8px;font-size:13px;margin-bottom:28px'>"
              "<tr style='background:#f5f7ff'><td style='padding:9px 14px;font-weight:700;color:#3949ab;width:38%'>Field</td><td style='padding:9px 14px;font-weight:700;color:#3949ab'>Value</td></tr>"
              "<tr><td style='padding:9px 14px;font-weight:600;color:#555'>Branch</td><td style='padding:9px 14px'>" + branch + "</td></tr>"
              "<tr><td style='padding:9px 14px;font-weight:600;color:#555'>Commit</td><td style='padding:9px 14px'><a href='" + commit_url + "' style='color:#1a237e'>" + short_sha + "</a></td></tr>"
              "<tr><td style='padding:9px 14px;font-weight:600;color:#555'>Triggered by</td><td style='padding:9px 14px'>" + actor + " (" + trigger + ")</td></tr>"
              "<tr><td style='padding:9px 14px;font-weight:600;color:#555'>Environment</td><td style='padding:9px 14px'>ubuntu-latest - Java 21 - REST Assured</td></tr>"
              + ("<tr><td style='padding:9px 14px;font-weight:600;color:#555'>Live Report</td><td style='padding:9px 14px'><a href='" + pages_url + "' style='color:#1a237e'>" + pages_url + "</a></td></tr>" if pages_url else "") +
              "</table>"
              "<h2 style='color:#1a237e'>Test Summary</h2>"
              "<table width='100%' cellpadding='6' cellspacing='6' style='margin-bottom:12px'><tr>"
              "<td style='background:#e8f5e9;border-radius:8px;padding:14px;text-align:center'><p style='margin:0;font-size:26px;font-weight:700;color:#2e7d32'>" + passed + "</p><p style='margin:4px 0 0;font-size:11px'>PASSED</p></td>"
              "<td style='background:#ffebee;border-radius:8px;padding:14px;text-align:center'><p style='margin:0;font-size:26px;font-weight:700;color:#b71c1c'>" + failed + "</p><p style='margin:4px 0 0;font-size:11px'>FAILED</p></td>"
              "<td style='background:#fff8e1;border-radius:8px;padding:14px;text-align:center'><p style='margin:0;font-size:26px;font-weight:700;color:#f57f17'>" + skipped + "</p><p style='margin:4px 0 0;font-size:11px'>SKIPPED</p></td>"
              "<td style='background:#f5f5f5;border-radius:8px;padding:14px;text-align:center'><p style='margin:0;font-size:26px;font-weight:700;color:#333'>" + total + "</p><p style='margin:4px 0 0;font-size:11px'>TOTAL</p></td>"
              "</tr></table>"
              "<p style='font-size:13px;color:#555'>Pass rate: <strong>" + pass_pct + "%</strong></p>"
              "<div style='background:#e0e0e0;border-radius:99px;height:10px;margin-bottom:28px'>"
              "<div style='background:" + s_color + ";width:" + pass_pct + "%;height:10px;border-radius:99px;min-width:4px'></div></div>"
              + fail_block +
              "<h2 style='color:#1a237e'>Next Steps</h2>"
              "<div style='background:#f5f7ff;border-radius:8px;padding:16px 20px;font-size:13px;color:#333'>" + next_steps + "</div>"
              "<div style='text-align:center;margin-top:32px'>"
              "<a href='" + run_url + "' style='display:inline-block;background:#1a237e;color:#fff;text-decoration:none;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:700;margin:5px'>View Run on GitHub</a>"
              + report_btn +
              "</div></td></tr>"
              "<tr><td style='background:#f5f7ff;border-radius:0 0 10px 10px;padding:16px 36px;text-align:center'>"
              "<p style='margin:0;font-size:11px;color:#9e9e9e'>Generated by REST Assured API CI pipeline</p>"
              "</td></tr></table></td></tr></table></body></html>"
          )

          subject = "[Run #" + run_num + "] REST Assured API Tests " + status + " - " + branch
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = "API Tests CI <" + gmail_user + ">"
          msg["To"] = report_to
          msg.attach(MIMEText(html, "html"))
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_pass)
              server.sendmail(gmail_user, report_to, msg.as_string())
          print("Email sent to " + report_to)
          SCRIPTEOF
          TOTAL="${{ steps.parse-results.outputs.total }}" \
          PASSED="${{ steps.parse-results.outputs.passed }}" \
          FAILED="${{ steps.parse-results.outputs.failed }}" \
          SKIPPED="${{ steps.parse-results.outputs.skipped }}" \
          ERRORS="${{ steps.parse-results.outputs.errors }}" \
          PASS_PCT="${{ steps.parse-results.outputs.pass_pct }}" \
          RUN_NUM="${{ github.run_number }}" \
          BRANCH="${{ github.ref_name }}" \
          ACTOR="${{ github.actor }}" \
          EVENT="${{ github.event_name }}" \
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
          SHORT_SHA="${{ github.sha }}" \
          PAGES_URL="https://giftburabyo-a11y.github.io/${{ github.event.repository.name }}/" \
          python3 /tmp/send_email.py

      # 9. Send Slack report
      - name: Send Slack report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          cat > /tmp/send_slack.py << 'SCRIPTEOF'
          import json, os, subprocess, sys, glob

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
              print("No SLACK_WEBHOOK_URL - skipping")
              sys.exit(0)

          total    = os.environ.get("TOTAL", "0")
          passed   = os.environ.get("PASSED", "0")
          failed   = os.environ.get("FAILED", "0")
          skipped  = os.environ.get("SKIPPED", "0")
          errors   = os.environ.get("ERRORS", "0")
          pass_pct = os.environ.get("PASS_PCT", "0")
          run_num  = os.environ.get("RUN_NUM", "0")
          branch   = os.environ.get("BRANCH", "unknown")
          actor    = os.environ.get("ACTOR", "unknown")
          run_url  = os.environ.get("RUN_URL", "")
          sha      = os.environ.get("SHORT_SHA", "")[:7]
          event    = os.environ.get("EVENT", "push")
          repo     = os.environ.get("REPO", "")
          pages_url = os.environ.get("PAGES_URL", "")
          triggers = {"push": "Push to branch", "pull_request": "Pull Request", "workflow_dispatch": "Manual trigger", "schedule": "Scheduled run"}
          trigger  = triggers.get(event, event)
          is_pass  = int(failed) == 0 and int(errors) == 0

          failing_tests = []
          for json_file in sorted(glob.glob("target/allure-results/*-result.json")):
              try:
                  with open(json_file, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception:
                  continue
              if data.get("status") not in ["failed", "broken"]:
                  continue
              labels = {l["name"]: l["value"] for l in data.get("labels", [])}
              test_class = labels.get("testClass", "").split(".")[-1] or "Unknown"
              steps_list = [str(i) + ". " + s.get("name", "Step") for i, s in enumerate(data.get("steps", []), 1)]
              steps_str  = "\n".join(steps_list) if steps_list else "See Allure report."
              desc       = (data.get("description") or "No description.").strip()
              severity   = labels.get("severity", "normal").capitalize()
              priority   = "High" if severity in ["Blocker", "Critical"] else ("Medium" if severity == "Normal" else "Low")
              msg        = data.get("statusDetails", {}).get("message", "No assertion message.")
              failing_tests.append({"name": data.get("name", "Unknown"), "class": test_class,
                  "desc": desc, "steps": steps_str, "severity": severity, "priority": priority, "message": msg})

          s_label = "PASSED" if is_pass else "FAILED"
          color   = "#2e7d32" if is_pass else "#e01e5a"

          failure_blocks = []
          for i, t in enumerate(failing_tests, 1):
              failure_blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": (
                      "*Test " + str(i) + ":* `" + t["name"] + "`\n"
                      "*Class:* `" + t["class"] + "` | *Severity:* " + t["severity"] + " | *Priority:* " + t["priority"] + "\n\n"
                      "*Description*\n" + t["desc"] + "\n\n"
                      "*Steps*\n" + t["steps"] + "\n\n"
                      "*Assertion Failure*\n```" + t["message"][:300] + "```"
                  )}
              })
              if i < len(failing_tests):
                  failure_blocks.append({"type": "divider"})

          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": "REST Assured API Tests " + s_label, "emoji": True}},
              {"type": "divider"},
              {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": "*Repository*\n" + repo},
                  {"type": "mrkdwn", "text": "*Branch*\n" + branch},
                  {"type": "mrkdwn", "text": "*Triggered by*\n" + actor + " (" + trigger + ")"},
                  {"type": "mrkdwn", "text": "*Commit*\n`" + sha + "`"},
                  {"type": "mrkdwn", "text": "*Run*\n<" + run_url + "|Run #" + run_num + ">"},
                  {"type": "mrkdwn", "text": "*Environment*\nubuntu-latest - Java 21 - REST Assured"},
              ]},
              {"type": "section", "text": {"type": "mrkdwn", "text": (
                  "*Test Summary*\n"
                  "Passed: *" + passed + "*   Failed: *" + failed + "*   "
                  "Skipped: *" + skipped + "*   Total: *" + total + "*   Pass rate: *" + pass_pct + "%*"
              )}},
          ]

          if pages_url:
              blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": "*Live Allure Report*\n<" + pages_url + "|View Full Report on GitHub Pages>"}
              })

          if failing_tests:
              blocks += [
                  {"type": "divider"},
                  {"type": "section", "text": {"type": "mrkdwn", "text": "*" + str(len(failing_tests)) + " Failing Test(s)*"}},
                  {"type": "divider"},
              ] + failure_blocks
          else:
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": "All tests passed. No failures to report."}})

          blocks += [
              {"type": "divider"},
              {"type": "actions", "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "View Run on GitHub", "emoji": True}, "url": run_url, "style": "primary"},
              ] + ([{"type": "button", "text": {"type": "plain_text", "text": "View Allure Report", "emoji": True}, "url": pages_url}] if pages_url else [])}
          ]

          payload = {"text": "REST Assured API Tests " + s_label + " - Run #" + run_num,
              "attachments": [{"color": color, "blocks": blocks}]}
          result = subprocess.run(
              ["curl", "-s", "-X", "POST", webhook, "-H", "Content-Type: application/json", "-d", json.dumps(payload)],
              capture_output=True, text=True)
          print(result.stdout)
          print("Slack sent - " + str(len(failing_tests)) + " failure(s).")
          SCRIPTEOF
          TOTAL="${{ steps.parse-results.outputs.total }}" \
          PASSED="${{ steps.parse-results.outputs.passed }}" \
          FAILED="${{ steps.parse-results.outputs.failed }}" \
          SKIPPED="${{ steps.parse-results.outputs.skipped }}" \
          ERRORS="${{ steps.parse-results.outputs.errors }}" \
          PASS_PCT="${{ steps.parse-results.outputs.pass_pct }}" \
          RUN_NUM="${{ github.run_number }}" \
          BRANCH="${{ github.ref_name }}" \
          ACTOR="${{ github.actor }}" \
          EVENT="${{ github.event_name }}" \
          REPO="${{ github.repository }}" \
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          SHORT_SHA="${{ github.sha }}" \
          PAGES_URL="https://giftburabyo-a11y.github.io/${{ github.event.repository.name }}/" \
          python3 /tmp/send_slack.py

      # 10. Write job summary to GitHub Actions UI
      - name: Summary
        if: always()
        run: |
          echo "## REST Assured API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric  | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total   | ${{ steps.parse-results.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed  | ${{ steps.parse-results.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed  | ${{ steps.parse-results.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors  | ${{ steps.parse-results.outputs.errors }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.parse-results.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pass %  | ${{ steps.parse-results.outputs.pass_pct }}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "https://giftburabyo-a11y.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2 — Generate and Deploy Allure Report to GitHub Pages
  # ============================================================
  generate-report:
    name: Generate and Deploy Allure Report
    runs-on: ubuntu-latest
    needs: api-tests
    if: always()

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Download the raw Allure results uploaded by the test job
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # 3. Generate the interactive Allure HTML report
      #    keep_reports: 20 means it keeps the last 20 run histories for the trend chart
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          keep_reports: 20

      # 4. Deploy the generated report to the gh-pages branch
      #    This is what makes it publicly accessible at your GitHub Pages URL
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

  # ============================================================
  # JOB 3 — Build and Push Docker Image
  # ============================================================
  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main'

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Convert repo name to lowercase — GHCR requires lowercase image names
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # 5. Build the image and push it to GHCR
      #    Tagged with both :latest and the specific commit SHA for traceability
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max