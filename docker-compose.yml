version: '3.8'

services:
  api-tests:
    build:
      context: .
      target: builder
    container_name: rest-assured-tests
    volumes:
      - allure-results:/app/target/allure-results
    environment:
      - BASE_URL=https://jsonplaceholder.typicode.com

  allure-report:
    image: frankescobar/allure-docker-service
    container_name: allure-report-server
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 1
      KEEP_HISTORY: 1
    ports:
      - "5050:5050"
    volumes:
      - allure-results:/app/allure-results
    depends_on:
      - api-tests

volumes:
  allure-results:
